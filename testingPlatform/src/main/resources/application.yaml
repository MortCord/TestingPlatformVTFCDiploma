spring:
  datasource:
    url: jdbc:mysql://localhost:3306/testingplatform
    username: ${BD_USERNAME}
    password: ${BD_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}